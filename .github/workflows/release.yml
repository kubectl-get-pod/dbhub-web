name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout releases branch (binaries)
        uses: actions/checkout@v4
        with:
          ref: releases

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: dbhub-web ${{ github.ref_name }}
          body: |
            ## dbhub-web ${{ github.ref_name }}

            零依赖跨平台 Web 数据库管理工具，单一可执行文件，开箱即用。

            ### 支持的数据库
            - MySQL
            - PostgreSQL
            - Oracle
            - SQL Server

            ### 下载
            选择对应操作系统的文件下载即可，无需安装任何依赖。
          files: |
            dbhub-web.exe
            dbhub-web
            dbhub-web-darwin-amd64
            dbhub-web-darwin-arm64
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
